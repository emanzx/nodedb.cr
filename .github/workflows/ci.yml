name: CI
on: [push, pull_request]
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with: {crystal: latest}
      - run: shards install
      - run: crystal tool format --check src spec
      - run: crystal spec

  integration:
    runs-on: ubuntu-latest
    services:
      nodedb:
        image: farhansyah/nodedb:0.4.0 # pinned tag — see docs/wire-facts.md
        ports: ["16432:6432"]
        env:
          # NODEDB_SUPERUSER_PASSWORD presets a deterministic password for the
          # fixed `nodedb` superuser/database, instead of the image's default
          # auto-generated-at-boot password (see docs/wire-facts.md — CI
          # mechanism section).
          NODEDB_SUPERUSER_PASSWORD: ci_integration_test_password
        # The image's baked-in HEALTHCHECK (`nodedb healthcheck`) 404s against
        # this container's /health endpoint and never reports healthy (see
        # docs/wire-facts.md) — GitHub Actions "services" blocks a job
        # waiting for a defined health check to pass, so left as-is this
        # would hang forever. --no-healthcheck disables Docker's health
        # gating; the explicit "wait for NodeDB" step below verifies real
        # liveness (an actual query) instead, matching wire-facts.md's
        # guidance to ignore container health status.
        options: >-
          --no-healthcheck
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with: {crystal: latest}
      - run: shards install
      - name: Wait for NodeDB to accept connections
        run: |
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/16432) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "NodeDB did not start listening on 16432 in time" >&2
          exit 1
      - run: crystal spec --tag integration
        env:
          NODEDB_URL: nodedb://nodedb:ci_integration_test_password@localhost:16432/nodedb
