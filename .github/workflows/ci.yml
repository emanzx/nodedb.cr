name: CI
on: [push, pull_request]
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with: {crystal: latest}
      - run: shards install
      - run: crystal tool format --check src spec
      - run: crystal spec

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with: {crystal: latest}
      # Started as an explicit step, NOT a `services:` block: the image's
      # baked-in HEALTHCHECK (`nodedb healthcheck`) 404s and never reports
      # healthy, and GH Actions' services readiness template crashes on
      # --no-healthcheck containers (`.Config.Healthcheck` stays truthy as
      # Test=NONE while `.State.Health` disappears → "map has no entry for
      # key Health"). A plain docker run + the TCP wait below sidesteps the
      # whole readiness machinery; see docs/wire-facts.md.
      # NODEDB_SUPERUSER_PASSWORD presets a deterministic password for the
      # fixed `nodedb` superuser/database (wire-facts.md — CI mechanism).
      - name: Start NodeDB
        run: >-
          docker run -d --name nodedb -p 16432:6432
          -e NODEDB_SUPERUSER_PASSWORD=ci_integration_test_password
          farhansyah/nodedb:0.4.0
      - run: shards install
      - name: Wait for NodeDB to accept connections
        run: |
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/16432) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "NodeDB did not start listening on 16432 in time" >&2
          exit 1
      - run: crystal spec --tag integration
        env:
          NODEDB_URL: nodedb://nodedb:ci_integration_test_password@localhost:16432/nodedb
